<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Publications — Intelligent Robotics &amp; Autonomy Lab (iRaL)</title>
<meta name="description" content="Peer-reviewed research and preprints from Vasileios Tzoumas and the Intelligent Robotics & Autonomy Lab (iRaL) at the University of Michigan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #e9ecee; }
  ::selection { background: #b6d4d9; }
  a { color: inherit; }
</style>
</head>
<body>
<div style="font-family:'IBM Plex Sans',sans-serif; color:#15181b; background:#e9ecee; min-height:100vh; -webkit-font-smoothing:antialiased;">

  <nav style="position:sticky; top:0; z-index:40; background:rgba(18,29,38,0.94); backdrop-filter:blur(10px); border-bottom:1px solid #2c3a40;">
    <div style="max-width:1180px; margin:0 auto; padding:0 44px; height:58px; display:flex; align-items:center; justify-content:space-between; gap:24px;">
      <a href="index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; white-space:nowrap;">
        <span style="width:9px; height:9px; background:#3f9aa8; border-radius:50%; display:inline-block;"></span>
        <span style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:#e7eef0;">Vasileios Tzoumas</span>
        <span style="font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; color:#5fb3c0; border:1px solid #2c5460; border-radius:3px; padding:2px 6px;">iRaL</span>
      </a>
      <div style="display:flex; gap:1px; font-family:'IBM Plex Mono',monospace; font-size:12px; flex-wrap:wrap; justify-content:flex-end;">
        <a href="index.html" style="padding:7px 12px; border-radius:4px; color:#9fb0b6; text-decoration:none; white-space:nowrap;">Home</a>
        <a href="team.html" style="padding:7px 12px; border-radius:4px; color:#9fb0b6; text-decoration:none; white-space:nowrap;">Team</a>
        <span style="padding:7px 12px; border-radius:4px; background:#3f9aa8; color:#0c1418; white-space:nowrap;">Publications</span>
        <a href="teaching.html" style="padding:7px 12px; border-radius:4px; color:#9fb0b6; text-decoration:none; white-space:nowrap;">Teaching &amp; Service</a>
        <a href="awards.html" style="padding:7px 12px; border-radius:4px; color:#9fb0b6; text-decoration:none; white-space:nowrap;">Awards &amp; Bio</a>
        <a href="resources.html" style="padding:7px 12px; border-radius:4px; color:#9fb0b6; text-decoration:none; white-space:nowrap;">Resources</a>
      </div>
    </div>
  </nav>

  <header style="background:#14202a; color:#e7eef0; padding:56px 0 52px;">
    <div style="max-width:1180px; margin:0 auto; padding:0 44px;">
      <div style="display:flex; align-items:center; gap:12px; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#5fb3c0; margin-bottom:20px;">
        <span style="width:8px; height:8px; background:#3f9aa8; border-radius:50%; display:inline-block;"></span>Peer-reviewed research &amp; preprints
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:32px; flex-wrap:wrap;">
        <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(38px,5vw,64px); line-height:1.0; letter-spacing:-0.02em; margin:0;">Publications</h1>
        <a href="https://scholar.google.com/citations?user=vzOOFNwAAAAJ&hl=en" style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:#0c1418; background:#3f9aa8; border-radius:5px; padding:9px 15px; text-decoration:none; white-space:nowrap;">Google Scholar ↗</a>
      </div>
      <div id="stats" style="display:flex; gap:14px; margin-top:30px; flex-wrap:wrap;"></div>
    </div>
  </header>

  <div style="max-width:1180px; margin:0 auto; padding:0 44px;">
    <div id="pub-groups"></div>

    <footer style="padding:48px 0 60px; margin-top:24px; display:flex; justify-content:space-between; border-top:1px solid #d4dadd; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d888c; flex-wrap:wrap; gap:12px;">
      <span>3049 François-Xavier Bagnoud Building · Ann Arbor</span>
      <span>vtzoumas [at] umich.edu · he/him</span>
    </footer>
  </div>
</div>

<style>
  @media (max-width: 860px) {
    nav > div, header > div, body > div > div { padding-left: 22px !important; padding-right: 22px !important; }
  }
</style>

<script type="module">
import { PUB_GROUPS, PUB_TOTAL } from './pubs-data.js';

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $ = (id) => document.getElementById(id);

// --- Header stats ---
const journal = PUB_GROUPS.find((g) => /journal/i.test(g.label));
const conf = PUB_GROUPS.find((g) => /conference/i.test(g.label));
const stats = [
  { n: PUB_TOTAL || '—', label: 'Total papers' },
  { n: journal ? journal.count : '—', label: 'Journal & preprints' },
  { n: conf ? conf.count : '—', label: 'Conference papers' },
];
$('stats').innerHTML = stats.map((s) =>
  `<div style="border:1px solid #2c3a40; border-radius:7px; padding:14px 20px; min-width:120px;">
     <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:30px; color:#e7eef0; line-height:1;">${esc(s.n)}</div>
     <div style="font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:#7d9298; margin-top:7px;">${esc(s.label)}</div>
   </div>`
).join('');

// --- Publication groups ---
$('pub-groups').innerHTML = PUB_GROUPS.map((group) => {
  const items = group.items.map((pub) => {
    const titleEl = pub.hasUrl
      ? `<a href="${esc(pub.url)}" style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:18.5px; line-height:1.32; color:#15181b; text-decoration:none; letter-spacing:-0.005em;">${esc(pub.title)}</a>`
      : `<span style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:18.5px; line-height:1.32; color:#15181b; letter-spacing:-0.005em;">${esc(pub.title)}</span>`;
    const tagEl = pub.hasTag
      ? `<span style="font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#0c1418; background:#cde4e8; border-radius:3px; padding:3px 8px; white-space:nowrap;">${esc(pub.tag)}</span>`
      : '';
    const linkEl = pub.hasUrl
      ? `<a href="${esc(pub.url)}" style="font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#3f8d9a; text-decoration:none; white-space:nowrap; margin-left:auto;">→ paper</a>`
      : '';
    return `<article style="display:grid; grid-template-columns:60px 1fr; gap:20px; background:#fff; border:1px solid #dde2e4; border-radius:8px; padding:18px 20px; align-items:start;">
      <div style="font-family:'IBM Plex Mono',monospace; font-size:13px; color:#3f8d9a; padding-top:3px; font-weight:500;">${esc(pub.year)}</div>
      <div>
        ${titleEl}
        <div style="font-size:14px; color:#5a666b; margin-top:7px;">${esc(pub.authors)}</div>
        <div style="display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;">
          <span style="font-size:12.5px; color:#8a979c; font-style:italic;">${esc(pub.venue)}</span>
          ${tagEl}
          ${linkEl}
        </div>
      </div>
    </article>`;
  }).join('');
  return `<section style="padding:46px 0 12px;">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:22px; border-bottom:1px solid #c8d0d3; padding-bottom:16px;">
      <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:26px; letter-spacing:-0.01em; margin:0;">${esc(group.label)}</h2>
      <span style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:#7d888c; white-space:nowrap;">${group.count} papers</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;">${items}</div>
  </section>`;
}).join('');
</script>
</body>
</html>
